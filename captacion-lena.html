<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Captación · Estudio Lena & Asociados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0f1f3d; --navy-mid:#1a3260; --navy-light:#243d75;
    --gold:#c9a84c; --gold-light:#e8c96a; --gold-pale:#f5ecd0;
    --cream:#faf8f3; --white:#ffffff;
    --g50:#f8f7f4; --g100:#eeece6; --g200:#d8d5cc; --g400:#9a9690; --g600:#5a5750; --g800:#2e2c28;
    --red:#c0392b; --red-light:#fdf0ee; --green:#1a6b4a; --green-light:#eaf4ef; --amber:#d99a2b;
    --r:10px; --rl:16px; --sh:0 2px 12px rgba(15,31,61,.10); --shl:0 8px 32px rgba(15,31,61,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--g800);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh}
  h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}
  button{font-family:'DM Sans',sans-serif;cursor:pointer}
  input,select,textarea{font-family:'DM Sans',sans-serif}
  ::selection{background:var(--gold-pale)}

  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,var(--navy),var(--navy-mid) 60%,var(--navy-light));z-index:50;padding:20px}
  .login-card{width:100%;max-width:390px;background:var(--white);border-radius:var(--rl);padding:40px 34px;box-shadow:var(--shl);border-top:4px solid var(--gold)}
  .brand-mark{text-align:center;margin-bottom:28px}
  .brand-mark .crest{font-size:12px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;font-weight:600}
  .brand-mark h1{font-size:32px;color:var(--navy);line-height:1.05;margin-top:6px}
  .brand-mark .sub{font-size:11px;letter-spacing:3px;color:var(--g400);text-transform:uppercase;margin-top:10px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--g600);margin-bottom:6px;font-weight:500}
  .field input{width:100%;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:12px 14px;color:var(--g800);font-size:15px;outline:none;transition:border-color .2s}
  .field input:focus{border-color:var(--gold);background:var(--white)}
  .btn-gold{width:100%;background:var(--navy);color:var(--white);border:none;border-radius:var(--r);padding:13px;font-size:14px;font-weight:600;letter-spacing:.5px;margin-top:8px;transition:background .2s}
  .btn-gold:hover{background:var(--navy-mid)}
  .btn-gold:disabled{opacity:.55;cursor:default}
  .login-msg{font-size:13px;color:var(--red);text-align:center;margin-top:14px;min-height:18px}

  #app{display:none;flex-direction:column;min-height:100vh}
  .topbar{display:flex;align-items:center;gap:16px;padding:13px 24px;background:linear-gradient(90deg,var(--navy),var(--navy-mid));border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:20;flex-wrap:wrap;box-shadow:0 2px 16px rgba(15,31,61,.3)}
  .topbar .logo{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;white-space:nowrap}
  .topbar .logo span{color:var(--gold-light)}
  .topbar .tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);background:rgba(255,255,255,.08);border:1px solid rgba(201,168,76,.4);padding:4px 10px;border-radius:20px;font-weight:600}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.7)}
  .live .dot{width:7px;height:7px;border-radius:50%;background:#7fd6a8;box-shadow:0 0 7px rgba(127,214,168,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .spacer{flex:1}
  .stat-chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,.82);cursor:pointer;transition:.15s}
  .chip b{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold-light)}
  .chip.hot b{color:#ff8676} .chip.ok b{color:#7fd6a8} .chip.gold b{color:var(--gold-light)}
  .chip.active{border-color:var(--gold);background:rgba(201,168,76,.18);box-shadow:0 0 0 2px rgba(201,168,76,.3)}
  .user-pill{display:flex;align-items:center;gap:9px}
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--white);border:1px solid rgba(201,168,76,.5)}
  .user-pill .nm{font-size:13px;color:#fff;font-weight:500}
  .icon-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);border-radius:var(--r);padding:8px 13px;font-size:12px;font-weight:500;transition:.2s}
  .icon-btn:hover{border-color:var(--gold);color:var(--gold-light)}

  .tabs{display:flex;gap:4px;padding:0 24px;background:var(--white);border-bottom:1px solid var(--g200);overflow-x:auto}
  .tab{background:none;border:none;color:var(--g600);font-size:13px;letter-spacing:.5px;font-weight:600;padding:13px 18px;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap}
  .tab.active{color:var(--navy);border-bottom-color:var(--gold)}
  .tab .badge{background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:6px}

  .view{flex:1;padding:22px 24px}
  #view-chat,#view-agenda,#view-planilla,#view-dash{display:none}

  /* BOARD */
  .board{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:980px;margin:0 auto}
  @media(max-width:640px){.board{grid-template-columns:1fr}}
  .col{background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);display:flex;flex-direction:column;min-height:240px;box-shadow:var(--sh)}
  .col-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--g100)}
  .col-head .t{font-size:13px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .col-head .c{font-family:'DM Serif Display',serif;font-size:20px;color:var(--g400)}
  .col.potencial .t{color:var(--navy)} .col.cliente .t{color:var(--green)}
  .col.potencial{border-top:3px solid var(--gold)} .col.cliente{border-top:3px solid var(--green)}
  .col-body{padding:13px;display:flex;flex-direction:column;gap:11px;flex:1;overflow-y:auto;max-height:calc(100vh - 250px)}
  .col-body.drag-over{background:var(--gold-pale)}
  .card{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .12s,box-shadow .2s,border-color .2s;box-shadow:0 1px 3px rgba(15,31,61,.05)}
  .card:hover{box-shadow:var(--sh);transform:translateY(-2px);border-color:var(--g400)}
  .card .age{height:3px;width:100%}
  .card-in{padding:12px 13px}
  .card .nm{font-size:15px;font-weight:600;color:var(--g800);margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;gap:8px}
  .card .desc{font-size:12.5px;color:var(--g600);line-height:1.4;margin:5px 0 9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;color:var(--g400)}
  .src{font-size:10px;letter-spacing:.4px;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:11px;white-space:nowrap}
  .src.WhatsApp{background:var(--green-light);color:var(--green)}
  .src.Instagram{background:#fdeef5;color:#c13584}
  .src.Facebook{background:#eaf1fb;color:#1877f2}
  .resp-av{width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--white)}
  .days{display:flex;align-items:center;gap:4px;font-weight:600}
  .days.hot{color:var(--red)} .days.warn{color:var(--amber)} .days.fresh{color:var(--g400)}
  .add-btn{margin:0 13px 13px;background:none;border:1px dashed var(--g200);color:var(--g600);border-radius:var(--r);padding:10px;font-size:12.5px;font-weight:500;transition:.2s}
  .add-btn:hover{border-color:var(--gold);color:var(--navy);background:var(--g50)}
  .empty-col{text-align:center;color:var(--g400);font-size:12.5px;padding:28px 10px;font-style:italic}
  .board-tools{max-width:980px;margin:0 auto 12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .search-inp{flex:1;min-width:200px;background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:10px 14px;font-size:14px;color:var(--g800);outline:none;box-shadow:var(--sh)}
  .search-inp:focus{border-color:var(--gold)}
  .mine-toggle{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:10px 16px;font-size:13px;font-weight:600;color:var(--g600);box-shadow:var(--sh);white-space:nowrap}
  .mine-toggle.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .hoy-banner{max-width:980px;margin:0 auto 14px;background:linear-gradient(120deg,var(--gold-pale),#fff);border:1px solid var(--gold);border-left:4px solid var(--gold);border-radius:var(--r);padding:13px 16px;box-shadow:var(--sh)}
  .hoy-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
  .hoy-items{display:flex;flex-wrap:wrap;gap:8px}
  .hoy-item{background:var(--white);border:1px solid var(--gold);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:600;color:var(--navy);cursor:pointer}
  .hoy-item.ag{border-color:var(--g200);color:var(--g600);cursor:default}
  .export-btn{background:var(--green);border:none;color:#fff;border-radius:30px;padding:7px 15px;font-size:12.5px;font-weight:600}
  .export-btn:hover{filter:brightness(1.06)}

  /* PLANILLA */
  .plan-wrap{background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden;max-width:1200px;margin:0 auto}
  .plan-tabs{display:flex;align-items:center;gap:6px;padding:12px 16px;border-bottom:1px solid var(--g100);flex-wrap:wrap;background:var(--g50)}
  .plan-tab{background:var(--white);border:1px solid var(--g200);border-radius:30px;padding:7px 16px;font-size:13px;font-weight:600;color:var(--g600)}
  .plan-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .plan-note{font-size:12px;color:var(--g600);margin-left:auto;display:flex;align-items:center;gap:6px}
  .plan-note .lock{font-size:11px;background:var(--gold-pale);color:var(--navy);border-radius:20px;padding:3px 9px;font-weight:600}
  .plan-scroll{overflow:auto;max-height:calc(100vh - 235px)}
  .plan-table{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  .plan-table th{position:sticky;top:0;background:var(--navy);color:#fff;font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;padding:9px 11px;text-align:left;z-index:1}
  .plan-table td{border-bottom:1px solid var(--g100);border-right:1px solid var(--g100);padding:3px 6px;color:var(--g800);max-width:260px;overflow:hidden;text-overflow:ellipsis}
  .plan-table tbody tr:hover{background:var(--g50)}
  .plan-table input,.plan-table select{border:1px solid transparent;background:transparent;border-radius:6px;padding:5px 7px;font-size:13px;color:var(--g800);width:100%;min-width:90px;font-family:inherit}
  .plan-table input:focus,.plan-table select:focus{border-color:var(--gold);background:var(--white);outline:none}
  .plan-table input:hover,.plan-table select:hover{background:var(--g50)}

  /* DASHBOARD */
  .dash-wrap{max-width:1000px;margin:0 auto}
  .dash-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  @media(max-width:760px){.dash-cards{grid-template-columns:1fr 1fr}}
  .dash-card{border-radius:var(--rl);padding:22px 20px;color:#fff;box-shadow:var(--sh);position:relative;overflow:hidden}
  .dash-card.gold{background:linear-gradient(135deg,var(--gold),#b8922f)}
  .dash-card.green{background:linear-gradient(135deg,var(--green),#0f5238)}
  .dash-card.navy{background:linear-gradient(135deg,var(--navy),var(--navy-light))}
  .dash-card .dv{font-family:'DM Serif Display',serif;font-size:40px;line-height:1}
  .dash-card .dl{font-size:13px;opacity:.92;margin-top:6px;font-weight:500}
  .dash-panel{background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);box-shadow:var(--sh);padding:22px}
  .dash-panel h2{font-size:22px;color:var(--navy);margin-bottom:4px}
  .dash-panel .sub{font-size:13px;color:var(--g600);margin-bottom:20px}
  .legend{display:flex;gap:18px;margin-bottom:14px;font-size:12px;color:var(--g600)}
  .legend span{display:flex;align-items:center;gap:6px}
  .legend i{width:12px;height:12px;border-radius:3px;display:inline-block}
  .chart{display:flex;align-items:flex-end;gap:14px;height:220px;padding-top:10px;border-bottom:2px solid var(--g200)}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
  .bars{display:flex;align-items:flex-end;gap:4px;height:100%;width:100%;justify-content:center}
  .bar{width:26px;border-radius:5px 5px 0 0;min-height:2px;transition:height .4s}
  .bar.c{background:var(--navy)} .bar.cl{background:var(--gold)}
  .bar-lbl{font-size:11px;color:var(--g600);margin-top:8px;font-weight:500}

  /* CHAT */
  .chat-wrap{max-width:860px;margin:0 auto;display:flex;flex-direction:column;height:calc(100vh - 175px);background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
  .conv-bar{display:flex;gap:7px;padding:12px 14px;border-bottom:1px solid var(--g100);overflow-x:auto;background:var(--g50)}
  .conv-pill{display:flex;align-items:center;gap:7px;background:var(--white);border:1px solid var(--g200);border-radius:30px;padding:7px 14px;font-size:13px;font-weight:600;color:var(--g600);white-space:nowrap;transition:.15s}
  .conv-pill:hover{border-color:var(--gold)}
  .conv-pill.active{background:var(--navy);color:var(--white);border-color:var(--navy)}
  .conv-pill .mini-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
  .conv-pill .unread{background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px}
  .chat-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:11px;background:var(--g50)}
  .day-sep{align-self:center;background:var(--g100);color:var(--g600);font-size:11px;font-weight:600;padding:3px 12px;border-radius:20px;margin:6px 0}
  .msg{max-width:78%;display:flex;flex-direction:column;gap:3px}
  .msg.mine{align-self:flex-end;align-items:flex-end}
  .msg .who{font-size:11px;color:var(--g600);font-weight:600;padding:0 4px}
  .bubble{background:var(--white);border:1px solid var(--g200);border-radius:12px;padding:9px 13px;font-size:14px;line-height:1.45;color:var(--g800);box-shadow:0 1px 2px rgba(15,31,61,.04)}
  .msg.mine .bubble{background:var(--gold-pale);border-color:var(--gold-light)}
  .bubble .lead-ref{display:block;margin-top:7px;padding-top:7px;border-top:1px solid rgba(0,0,0,.08);font-size:12px;color:var(--navy);font-weight:600;cursor:pointer}
  .att-img{max-width:220px;max-height:220px;border-radius:8px;display:block;cursor:pointer;background:var(--g100)}
  .att-file{display:inline-flex;align-items:center;gap:7px;color:var(--navy);font-weight:600;font-size:13px;text-decoration:none;background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:7px 11px}
  .msg .tm{font-size:10px;color:var(--g400);padding:0 4px}
  .chat-input{display:flex;gap:9px;padding:13px;border-top:1px solid var(--g100);background:var(--white);align-items:center}
  .clip-btn{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);width:42px;height:42px;font-size:18px;color:var(--g600);flex:0 0 auto}
  .clip-btn:hover{border-color:var(--gold);color:var(--navy)}
  .chat-input input[type=text]{flex:1;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:11px 14px;color:var(--g800);font-size:14px;outline:none}
  .chat-input input[type=text]:focus{border-color:var(--gold);background:var(--white)}
  .send-btn{background:var(--navy);border:none;color:var(--white);border-radius:var(--r);padding:0 20px;height:42px;font-weight:600;font-size:13px}
  .attach-note{padding:0 14px 8px;font-size:12px;color:var(--green);display:none}
  .attach-note.show{display:block}

  /* AGENDA */
  .cal-wrap{max-width:900px;margin:0 auto;background:var(--white);border:1px solid var(--g200);border-radius:var(--rl);box-shadow:var(--sh);overflow:hidden}
  .cal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--g100);background:var(--navy)}
  .cal-head h2{font-size:24px;color:#fff;text-transform:capitalize}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:8px;min-width:36px;height:36px;font-size:14px;color:#fff;padding:0 10px}
  .cal-nav button:hover{border-color:var(--gold);color:var(--gold-light)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-dow{text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--g400);font-weight:600;padding:10px 0;border-bottom:1px solid var(--g100)}
  .cal-cell{min-height:94px;border-right:1px solid var(--g100);border-bottom:1px solid var(--g100);padding:6px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:3px}
  .cal-cell:hover{background:var(--g50)}
  .cal-cell.other{background:var(--g50);opacity:.5}
  .cal-cell.today .dnum{background:var(--gold);color:var(--navy)}
  .dnum{font-size:13px;font-weight:700;color:var(--g600);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
  .ev{font-size:10.5px;border-radius:4px;padding:2px 5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ev.ag{background:var(--gold-pale);border-left:3px solid var(--gold);color:var(--g800)}
  .ev.lead{background:#e8eefb;border-left:3px solid var(--navy-light);color:var(--navy)}
  .ev.done{background:var(--green-light);border-left-color:var(--green);text-decoration:line-through;color:var(--g400)}
  @media(max-width:640px){.cal-cell{min-height:60px}.ev{display:none}.cal-cell.has::after{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold)}}

  /* MODAL */
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(15,31,61,.45);z-index:40;align-items:center;justify-content:center;padding:18px;backdrop-filter:blur(2px)}
  .modal-bg.open{display:flex}
  .modal{width:100%;max-width:540px;max-height:92vh;overflow-y:auto;background:var(--white);border-radius:var(--rl);box-shadow:var(--shl)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--g100);position:sticky;top:0;background:var(--white);z-index:2}
  .modal-head h2{font-size:26px;color:var(--navy)}
  .x{background:none;border:none;color:var(--g400);font-size:26px;line-height:1;cursor:pointer}
  .x:hover{color:var(--g800)}
  .modal-body{padding:22px 24px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:var(--g600);margin-bottom:5px;font-weight:600}
  .f input,.f select,.f textarea{width:100%;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:10px 12px;color:var(--g800);font-size:14px;outline:none}
  .f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold);background:var(--white)}
  .f textarea{resize:vertical;min-height:58px}
  .f .hint{font-size:11px;color:var(--g400);margin-top:4px;font-weight:400;text-transform:none;letter-spacing:0}

    if(c.f==='_fecha')v=(r.creado_at||r.ultimo_contacto)?new Date(r.creado_at||r.ultimo_contacto).toLocaleDateString('es-AR'):'';
    else if(c.t==='resp')v=EQUIPO[r.responsable]?EQUIPO[r.responsable].n:'';
    else if(c.t==='date'&&r[c.f])v=new Date(r[c.f]).toLocaleDateString('es-AR');
    else if(c.t==='pdate'&&r[c.f])v=new Date(r[c.f]+'T12:00:00').toLocaleDateString('es-AR');
    else v=r[c.f]||'';
    return '"'+String(v).replace(/"/g,'""')+'"';
  };
  const lines=[cols.map(c=>'"'+c.h+'"').join(',')].concat(rows.map(r=>cols.map(c=>cell(r,c)).join(',')));
  const csv='\ufeff'+lines.join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=(planSub==='cliente'?'clientes':'futuros_clientes')+'_lena.csv';
  document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast('Exportado para Excel');
}

function canEditPlan(){return ME&&ME.id===SANTIAGO_ID}
function cellHtml(r,col,edit){
  if(col.t==='ro'){
    let v='';
    if(col.f==='_fecha'&&(r.creado_at||r.ultimo_contacto))v=new Date(r.creado_at||r.ultimo_contacto).toLocaleDateString('es-AR');
    return `<td>${esc(v)}</td>`;
  }
  const val=r[col.f];
  if(!edit){
    let disp=val||'';
    if(col.t==='resp')disp=EQUIPO[val]?EQUIPO[val].n:'';
    if(col.t==='date'&&val)disp=new Date(val).toLocaleDateString('es-AR');
    if(col.t==='pdate'&&val)disp=new Date(val+'T12:00:00').toLocaleDateString('es-AR');
    return `<td>${esc(disp)}</td>`;
  }
  const oc=`onchange="saveCell('${r.id}','${col.f}',this)"`;
  if(col.t==='date')return `<td><input type="date" value="${val?toISODate(val):''}" ${oc}></td>`;
  if(col.t==='pdate')return `<td><input type="date" value="${val||''}" ${oc}></td>`;
  if(col.t==='resp')return `<td><select ${oc}><option value="">—</option>${Object.entries(EQUIPO).map(([id,e])=>`<option value="${id}" ${val===id?'selected':''}>${e.n}</option>`).join('')}</select></td>`;
  if(col.t==='aseg')return `<td><select ${oc}><option value="">—</option>${['Sí','No','Se desconoce'].map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></td>`;
  return `<td><input value="${esc(val||'')}" ${oc}></td>`;
}

function convKeyOf(m){return m.destinatario==null?'todos':(m.autor===ME.id?m.destinatario:m.autor)}
function inConv(m,c){if(c==='todos')return m.destinatario==null;return m.destinatario!=null&&((m.autor===ME.id&&m.destinatario===c)||(m.autor===c&&m.destinatario===ME.id))}
function dayLabel(d){const t=new Date(),y=new Date(t.getTime()-86400000);if(ymd(d)===ymd(t))return 'Hoy';if(ymd(d)===ymd(y))return 'Ayer';return d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}
function renderChat(){
  const box=document.getElementById('chatMsgs');
  const msgs=MSGS.filter(m=>inConv(m,currentConv));
  let html='',lastDay='';
  msgs.forEach(m=>{
    const dt=new Date(m.creado_at),dk=ymd(dt);
    if(dk!==lastDay){html+=`<div class="day-sep">${dayLabel(dt)}</div>`;lastDay=dk;}
    const mine=m.autor===ME.id,a=EQUIPO[m.autor];
    const tm=dt.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    let body='';
    if(m.archivo_path){
      if((m.archivo_tipo||'').startsWith('image/'))body+=`<img class="att-img" data-att="${esc(m.archivo_path)}" onclick="if(this.src)window.open(this.src,'_blank')" alt="">`;
      else body+=`<a class="att-file" data-att="${esc(m.archivo_path)}" target="_blank">📎 ${esc(m.archivo_nombre||'archivo')}</a>`;
    }
    if(m.contenido)body+=(body?'<div style="margin-top:6px">':'')+esc(m.contenido)+(body?'</div>':'');
    let ref='';
    if(m.lead_id){const l=LEADS.find(x=>x.id===m.lead_id);if(l)ref=`<span class="lead-ref" onclick="openFromChat('${l.id}')">↗ abrir ficha de ${esc(l.nombre)}</span>`;}
    html+=`<div class="msg ${mine?'mine':''}"><span class="who">${a?a.n:'—'}</span><div class="bubble">${body||'·'}${ref}</div><span class="tm">${tm}</span></div>`;
  });
  box.innerHTML=html||'<div class="empty-col" style="margin:auto">Sin mensajes en esta conversación</div>';
  box.scrollTop=box.scrollHeight;resolveAtt();
}
function resolveAtt(){
  document.querySelectorAll('[data-att]').forEach(async el=>{
    const path=el.getAttribute('data-att');el.removeAttribute('data-att');
    let url=signedCache[path];
    if(!url){try{const {data}=await sb.storage.from('carpetas').createSignedUrl(path,3600);url=data&&data.signedUrl;if(url)signedCache[path]=url;}catch(e){}}
    if(url){if(el.tagName==='IMG')el.src=url;else el.href=url;}
  });
}

function dayItems(key){

function calMove(d){calMonth+=d;if(calMonth<0){calMonth=11;calYear--}if(calMonth>11){calMonth=0;calYear++}renderCalendar()}
function calToday(){const t=new Date();calMonth=t.getMonth();calYear=t.getFullYear();renderCalendar()}
function renderCalendar(){
  document.getElementById('calTitle').textContent=MES[calMonth]+' '+calYear;
  document.getElementById('calDow').innerHTML=DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const start=new Date(calYear,calMonth,1).getDay(),days=new Date(calYear,calMonth+1,0).getDate(),today=ymd(new Date());
  for(let i=0;i<start;i++){const c=document.createElement('div');c.className='cal-cell other';grid.appendChild(c)}
  for(let d=1;d<=days;d++){
    const key=ymd(new Date(calYear,calMonth,d)),items=dayItems(key);
    const cell=document.createElement('div');cell.className='cal-cell'+(key===today?' today':'')+(items.length?' has':'');
    let inner=`<div class="dnum">${d}</div>`;
    items.slice(0,3).forEach(e=>inner+=`<div class="ev ${e.type==='lead'?'lead':'ag'} ${e.hecho?'done':''}">${e.hora?esc(e.hora)+' ':''}${esc(e.titulo)}</div>`);
    if(items.length>3)inner+=`<div class="ev" style="background:none;color:var(--g400)">+${items.length-3} más</div>`;
    cell.innerHTML=inner;cell.addEventListener('click',()=>openDay(key));grid.appendChild(cell);
  }

function openDay(key){
  dayCtx=key;

  const items=dayItems(key);
  document.getElementById('dayList').innerHTML=items.length?items.map(e=>{
    const r=EQUIPO[e.responsable];
    if(e.type==='lead')return `<div class="day-ev lead"><div class="info"><div class="t">📞 ${esc(e.titulo)}</div>${r?`<div class="d">Responsable: ${r.n}</div>`:''}</div><button class="mini-act" onclick="document.getElementById('dayBg').classList.remove('open');openFromChat('${e.id}')">Abrir ficha</button></div>`;
    return `<div class="day-ev ${e.hecho?'done':''}"><button class="chk ${e.hecho?'on':''}" onclick="toggleHecho('${e.id}',${!e.hecho})">${e.hecho?'✓':''}</button><div class="info"><div class="t">${e.hora?esc(e.hora)+' · ':''}${esc(e.titulo)}</div>${e.detalle?`<div class="d">${esc(e.detalle)}</div>`:''}${r?`<div class="d">Responsable: ${r.n}</div>`:''}</div><button class="del-ev" onclick="delAgenda('${e.id}')">🗑</button></div>`;
  }).join(''):'<div style="font-size:13px;color:var(--g400);margin-bottom:6px">No hay nada cargado para este día.</div>';
  document.getElementById('evTitulo').value='';document.getElementById('evHora').value='';document.getElementById('evDetalle').value='';document.getElementById('evResp').value='';
  document.getElementById('dayBg').classList.add('open');
}
async function addAgenda(){
  const titulo=document.getElementById('evTitulo').value.trim();
  if(!titulo){toast('Escribí qué hay que hacer.',true);return}
  const row={fecha:dayCtx,titulo,hora:document.getElementById('evHora').value.trim()||null,detalle:document.getElementById('evDetalle').value.trim()||null,responsable:document.getElementById('evResp').value||null,creado_por:ME.id};
  const {error}=await sb.from('agenda_captacion').insert(row);
  if(error){toast('Error: '+error.message,true);return}
  toast('Agregado');await loadAgenda();openDay(dayCtx);renderCalendar();
}
async function toggleHecho(id,val){await sb.from('agenda_captacion').update({hecho:val}).eq('id',id);await loadAgenda();openDay(dayCtx);renderCalendar()}
async function delAgenda(id){if(!confirm('¿Eliminar?'))return;await sb.from('agenda_captacion').delete().eq('id',id);await loadAgenda();openDay(dayCtx);renderCalendar()}

// VIEWS
function showView(v){
  curView=v;
  ['board','planilla','agenda','dash','chat'].forEach(x=>{document.getElementById('view-'+x).style.display=x===v?'block':'none';document.getElementById('tab-'+x).classList.toggle('active',x===v)});
  if(v==='planilla')renderPlanilla();
  if(v==='agenda')renderCalendar();
  if(v==='dash')renderDashboard();
  if(v==='chat'){unread[currentConv]=0;updateBadges();renderChat()}
}

// REALTIME
function subscribeRealtime(){
  sb.channel('rt-leads').on('postgres_changes',{event:'*',schema:'public',table:'leads_captacion'},()=>loadLeads()).subscribe();
  sb.channel('rt-agenda').on('postgres_changes',{event:'*',schema:'public',table:'agenda_captacion'},()=>loadAgenda()).subscribe();
  sb.channel('rt-msgs').on('postgres_changes',{event:'INSERT',schema:'public',table:'mensajes_equipo'},payload=>{
    const m=payload.new;
    if(!(m.destinatario==null||m.autor===ME.id||m.destinatario===ME.id))return;
    if(MSGS.find(x=>x.id===m.id))return;
    MSGS.push(m);
    if(curView==='chat'&&inConv(m,currentConv))renderChat();
    if(m.autor!==ME.id&&!(curView==='chat'&&inConv(m,currentConv))){const k=convKeyOf(m);unread[k]=(unread[k]||0)+1}
    updateBadges();buildConvBar();
  }).subscribe();
}

sb.auth.getSession().then(({data})=>{if(data.session&&EQUIPO[data.session.user.id])startApp(data.session.user)});
</script>
